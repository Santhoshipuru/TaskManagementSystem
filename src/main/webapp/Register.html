<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .container {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Register</h2>

    <!-- MESSAGE -->
    <p id="msg" style="color:red;"></p>

    <!-- 🔥 FORM -->
    <form id="regForm" action="RegisterServlet" method="post" autocomplete="off">

        <input type="text" name="username" placeholder="Username" required autocomplete="off">
        
        <input type="password" name="password" placeholder="Password" required autocomplete="new-password">
        
        <button type="submit">Register</button>

    </form>

    <a href="Login.jsp">Already have account? Login</a>

</div>

<script>
    // 🔥 Clear form on page load (fix autofill issue)
    window.onload = function () {
        document.getElementById("regForm").reset();
    };

    // 🔥 Show message
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");

    if (msg === "exists") {
        document.getElementById("msg").innerText = "User already exists!";
    }
</script>

</body>
</html>
